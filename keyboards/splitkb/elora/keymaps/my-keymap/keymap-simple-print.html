<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elora Keymap — BASE / NAV / NUM</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 8mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: white;
      color: black;
    }

    .page {
      width: 194mm;   /* 210mm - 2x8mm margins */
      height: 281mm;  /* 297mm - 2x8mm margins */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2mm;
      margin-bottom: 2mm;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 11pt;
      margin: 0;
    }

    header p {
      font-size: 7.5pt;
      color: #555;
      margin: 0;
    }

    .keymap-container {
      flex: 1;
      overflow: hidden;
    }

    .keymap-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .footer {
      flex-shrink: 0;
      font-size: 7pt;
      color: #555;
      border-top: 1px solid #eee;
      padding-top: 1.5mm;
      margin-top: 2mm;
    }

    .footer .row {
      display: flex;
      justify-content: space-between;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    @media screen {
      body {
        background: #888;
        padding: 10px;
      }
      .page {
        background: white;
        margin: 0 auto 20px;
        padding: 8mm;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <header>
      <h1>Elora — BASE / NAV / NUM (Windows)</h1>
      <p>splitkb/elora/rev1 &mdash; LAYOUT_myr</p>
    </header>
    <div class="keymap-container">
      <img src="keymap-simple.svg" alt="BASE, NAV and NUM layers">
    </div>
    <div class="footer">
      <div class="row">
        <span>
          <strong>Combos:</strong>
          J+K &rarr; Backspace &nbsp;&bull;&nbsp;
          K+L &rarr; Delete &nbsp;&bull;&nbsp;
          R+F &rarr; Enter &nbsp;&bull;&nbsp;
          E+D &rarr; Backspace
        </span>
      </div>
      <div class="row">
        <span>
          <strong>NAV:</strong> hold right thumb &nbsp;&bull;&nbsp;
          <strong>NUM:</strong> hold left thumb &nbsp;&bull;&nbsp;
          <strong>SW WIN:</strong> hold NUM + tap to cycle windows (Alt+Tab)
        </span>
      </div>
    </div>
  </div>

</body>
</html>
